name: vpn_client
description: VPN 机场客户端 - 支持 VMess / Shadowsocks
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # 网络请求
  dio: ^5.4.0
  # 连接检查
  connectivity_plus: ^6.0.3
  # 权限
  permission_handler: ^11.3.0
  # 路径
  path_provider: ^2.1.3
  # 二维码扫描
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
