name: vpn_client
description: VPN 机场客户端 - 支持 VMess / Shadowsocks
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # 状态管理
  provider: ^6.1.2
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # 网络请求
  dio: ^5.7.0
  # 二维码扫描
  mobile_scanner: ^5.2.3
  # URL Launcher
  url_launcher: ^6.3.1
  # 剪贴板
  # 状态栏颜色
  flutter_statusbarcolor_ns: ^0.5.0
  # 连接性检查
  connectivity_plus: ^6.1.0
  # 权限
  permission_handler: ^11.3.1
  # 分享
  share_plus: ^10.1.3
  # 路径
  path_provider: ^2.1.5
  # 加密存储
  flutter_secure_storage: ^9.2.3
  # JSON
  json_annotation: ^4.9.0
  # 国际化
  intl: ^0.19.0
  # VPN 核心
  flutter_v2ray: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
