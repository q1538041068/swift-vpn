name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Bootstrap Gradle wrapper
        run: |
          cd android
          if [ ! -f gradlew ]; then
            curl -sL "https://services.gradle.org/distributions/gradle-8.3-bin.zip" -o /tmp/gradle.zip
            unzip -qo /tmp/gradle.zip -d /tmp
            /tmp/gradle-8.3/bin/gradle wrapper --gradle-version 8.3
          fi

      - name: Build APK
        shell: bash
        run: |
          set +o pipefail
          # Try Gradle directly for better error output
          cd android
          ./gradlew assembleRelease 2>&1 | tee ../build.log
          rc=${PIPESTATUS[0]}
          {
            echo "---"
            echo "EXIT_CODE=$rc"
            echo "---"
            find . -name "*.apk" 2>/dev/null || echo "(no apk found)"
          } >> ../build.log
          exit $rc

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: swift-vpn-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          name: "SwiftVPN APK"
          tag_name: "v1.0.${{ github.run_number }}"
          files: android/app/build/outputs/apk/release/*.apk
