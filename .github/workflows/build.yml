name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24'
          channel: 'stable'

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Bootstrap Gradle wrapper
        run: |
          cd android
          if [ ! -f gradlew ]; then
            curl -sL "https://services.gradle.org/distributions/gradle-8.3-bin.zip" -o /tmp/gradle.zip
            unzip -qo /tmp/gradle.zip -d /tmp
            /tmp/gradle-8.3/bin/gradle wrapper --gradle-version 8.3
          fi

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Upload ABI-split APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-split
          path: build/app/outputs/flutter-apk/app-*-release.apk

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-universal
          path: build/app/outputs/flutter-apk/app-release.apk
