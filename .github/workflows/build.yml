name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Bootstrap Gradle wrapper
        run: |
          cd android
          if [ ! -f gradlew ]; then
            curl -sL "https://services.gradle.org/distributions/gradle-8.3-bin.zip" -o /tmp/gradle.zip
            unzip -qo /tmp/gradle.zip -d /tmp
            /tmp/gradle-8.3/bin/gradle wrapper --gradle-version 8.3
          fi

      - name: Build APK (arm64 only)
        shell: bash
        run: |
          set +o pipefail
          flutter build apk --release --target-platform android-arm64 2>&1 | tee build.log
          echo "---" >> build.log
          echo "EXIT_CODE=$?" >> build.log
          echo "---" >> build.log
          find build/ -name "*.apk" 2>/dev/null >> build.log || echo "(no apk found)" >> build.log

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: swift-vpn-apk
          path: build/app/outputs/flutter-apk/*.apk
